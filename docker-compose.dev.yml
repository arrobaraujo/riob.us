services:
  riob-us:
    volumes:
      - ./:/app
    environment:
      - FLASK_ENV=development
      - TZ=America/Sao_Paulo
      - GUNICORN_THREADS=2
      - GUNICORN_TIMEOUT=180
    command: >
      sh -c "gunicorn src.core.app_runtime:server
      --reload
      --workers 1
      --threads ${GUNICORN_THREADS:-2}
      --timeout ${GUNICORN_TIMEOUT:-180}
      --bind 0.0.0.0:${PORT:-8080}
      --access-logfile -
      --error-logfile -
      --log-level info"
