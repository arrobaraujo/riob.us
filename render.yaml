services:
  - type: web
    name: gps-bus-rio
    env: python
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c 'gunicorn app:server --bind 0.0.0.0:${PORT:-10000} --workers 1 --threads 2 --timeout 180 --access-logfile - --error-logfile - --log-level info'
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8